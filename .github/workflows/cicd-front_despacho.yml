name: CI/CD Innovatech - Frontend

on:
  push:
    branches: ["deploy"]

jobs:
  build-push-deploy-front_despacho:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR (runner)
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build imagen Frontend y push a ECR
        run: |
          docker build -t frontend-despacho .
          docker tag frontend-despacho:latest ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest
          docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest

      - name: Desplegar Frontend vía SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar frontend-despacho desde ECR" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
              "docker stop frontend-despacho || true",
              "docker rm frontend-despacho || true",
              "docker run -d --name frontend-despacho -p 80:80 ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest"
            ]}' \
            --output text
